name: Windows Tests + GUI Screenshot

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  windows-tests-and-screenshot:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
            pip install pytest-asyncio
          } else {
            # fallback: install likely deps used by this repo
            pip install pytest pytest-asyncio pyside6 qasync matplotlib numpy scipy aiohttp python-dotenv aiolimiter
          }

      - name: Run unit tests
        shell: pwsh
        run: |
          pytest -q

      - name: Run GUI and capture screenshot
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $env:PYTHONUNBUFFERED = "1"
          $env:QT_QPA_PLATFORM = "windows"
          $env:QT_QPA_FONTDIR = "C:\Windows\Fonts"
          $stdoutLogPath = Join-Path $PWD "artifacts/demo-screenshot.stdout.log"
          $stderrLogPath = Join-Path $PWD "artifacts/demo-screenshot.stderr.log"
          $combinedLogPath = Join-Path $PWD "artifacts/demo-screenshot.log"
          $windowShotPath = Join-Path $PWD "artifacts/gui-windows-screenshot.png"

          # Start GUI app in deterministic offline screenshot mode and let it
          # directly capture its own window surface (robust in CI/session-0).
          $arguments = @(
            "multileg_rfq_orchestrator_GUI_WIN.py",
            "--demo-screenshot",
            "--screenshot-path", $windowShotPath,
            "--auto-exit-after-ready"
          )
          $proc = Start-Process python `
            -ArgumentList $arguments `
            -RedirectStandardOutput $stdoutLogPath `
            -RedirectStandardError $stderrLogPath `
            -PassThru

          $failed = $false
          $failMessage = ""

          # Wait for bounded time; fail with logs if the process stalls.
          $finished = $proc.WaitForExit(45000)
          if (-not $finished) {
            Stop-Process -Id $proc.Id -Force
            $failed = $true
            $failMessage = "Demo screenshot process exceeded timeout (45s)"
          }
          if ((-not $failed) -and $proc.ExitCode -ne 0) {
            $failed = $true
            $failMessage = "Demo screenshot process failed with exit code $($proc.ExitCode)"
          }

          # Persist a combined log artifact for troubleshooting
          if (Test-Path $stdoutLogPath) {
            Get-Content $stdoutLogPath | Set-Content $combinedLogPath
          }
          if (Test-Path $stderrLogPath) {
            Add-Content $combinedLogPath "`n--- STDERR ---"
            Get-Content $stderrLogPath | Add-Content $combinedLogPath
          }
          $stdoutContent = ""
          $stderrContent = ""
          if (Test-Path $stdoutLogPath) {
            $stdoutContent = Get-Content $stdoutLogPath -Raw
          }
          if (Test-Path $stderrLogPath) {
            $stderrContent = Get-Content $stderrLogPath -Raw
          }

          if ((-not $failed) -and ($stdoutContent -notmatch "DEMO_SCREENSHOT_READY")) {
            $failed = $true
            $failMessage = "Missing DEMO_SCREENSHOT_READY marker in stdout"
          }
          if ((-not $failed) -and ($stdoutContent -notmatch "DEMO_SCREENSHOT_SAVED")) {
            $failed = $true
            $failMessage = "Missing DEMO_SCREENSHOT_SAVED marker in stdout"
          }
          if ((-not $failed) -and (($stdoutContent + "`n" + $stderrContent) -match "DEMO_SCREENSHOT_SAVE_FAILED")) {
            $failed = $true
            $failMessage = "Demo screenshot save reported failure"
          }

          if ((-not $failed) -and (-not (Test-Path $windowShotPath))) {
            $failed = $true
            $failMessage = "Window screenshot was not produced at $windowShotPath"
          }

          if (-not $failed) {
            $validatorPath = Join-Path $PWD "artifacts/validate_screenshot.py"
            @'
import sys
from PySide6.QtGui import QImage


def fail(message: str) -> None:
    print(f"SCREENSHOT_VALIDATION_FAILED {message}")
    raise SystemExit(1)


image_path = sys.argv[1]
img = QImage(image_path)
if img.isNull():
    fail("image could not be loaded")

width = img.width()
height = img.height()
if width < 1000 or height < 600:
    fail(f"unexpected dimensions {width}x{height}")

step_x = max(1, width // 64)
step_y = max(1, height // 48)
samples = []
for y in range(0, height, step_y):
    for x in range(0, width, step_x):
        c = img.pixelColor(x, y)
        lum = int(round(0.2126 * c.red() + 0.7152 * c.green() + 0.0722 * c.blue()))
        samples.append(lum)

if not samples:
    fail("no luminance samples collected")

spread = max(samples) - min(samples)
unique_luma = len(set(samples))
if spread < 20 or unique_luma < 20:
    fail(f"low visual variance spread={spread} unique={unique_luma}")

print(f"SCREENSHOT_VALIDATION_OK {width}x{height} spread={spread} unique={unique_luma}")
'@ | Set-Content -Path $validatorPath -Encoding UTF8

            python $validatorPath $windowShotPath
            if ($LASTEXITCODE -ne 0) {
              $failed = $true
              $failMessage = "Screenshot validation script failed"
            }
          }

          if ($failed) {
            if (Test-Path $combinedLogPath) {
              Write-Host "----- demo-screenshot.log (tail) -----"
              Get-Content $combinedLogPath -Tail 200 | Write-Host
            }
            throw $failMessage
          }

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-gui-screenshot
          path: artifacts/gui-windows-screenshot.png
          if-no-files-found: error

      - name: Upload screenshot diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-gui-screenshot-diagnostics
          path: artifacts/demo-screenshot*.log
          if-no-files-found: warn
